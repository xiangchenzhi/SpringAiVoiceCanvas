spring:
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
  datasource:
    url: "jdbc:mysql://127.0.0.1:3306/voice_canvas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf-8"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
siliconflow:
  api-key: ${SILICONFLOW_API_KEY}
  image-url: https://api.siliconflow.cn/v1/images/generations

chat:
  memory:
    max-rounds: 5

xunfei:
  app-id: ${XF_APP_ID:}
  api-key: ${XF_API_KEY:}
  api-secret: ${XF_API_SECRET:}